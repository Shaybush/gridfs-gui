name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ============================================================
  # Build & push: GridFS GUI (nginx + React frontend)
  # Image: shaybushary/gridfs-gui
  # Context: gui/
  # ============================================================
  build-gui:
    name: Build and push gridfs-gui image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract tag version
        id: tag
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push gridfs-gui
        uses: docker/build-push-action@v6
        with:
          context: ./gui
          file: ./gui/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            shaybushary/gridfs-gui:latest
            shaybushary/gridfs-gui:${{ steps.tag.outputs.version }}
          cache-from: type=gha,scope=gridfs-gui
          cache-to: type=gha,mode=max,scope=gridfs-gui

  # ============================================================
  # Build & push: GridFS GUI Server (FastAPI backend)
  # Image: shaybushary/gridfs-gui-server
  # Context: server/
  # ============================================================
  build-server:
    name: Build and push gridfs-gui-server image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract tag version
        id: tag
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push gridfs-gui-server
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            shaybushary/gridfs-gui-server:latest
            shaybushary/gridfs-gui-server:${{ steps.tag.outputs.version }}
          cache-from: type=gha,scope=gridfs-gui-server
          cache-to: type=gha,mode=max,scope=gridfs-gui-server
