previews:
  generation: manual
  expireAfterDays: 1

projects:
  - name: gridfs-gui
    environments:
      # ============================================
      # Production (branch: main)
      # ============================================
      - name: production
        services:
          # Frontend: React + Vite static site served via nginx
          - type: web
            name: gridfs-gui-frontend
            runtime: static
            branch: main
            autoDeploy: true
            buildCommand: cd gui && pnpm install && pnpm build
            staticPublishPath: gui/dist
            headers:
              - path: /*
                name: Cache-Control
                value: no-cache
            routes:
              - type: rewrite
                source: /*
                destination: /index.html

          # Backend: FastAPI (Python via Docker)
          - type: web
            name: gridfs-gui-server
            runtime: docker
            branch: main
            rootDir: ./
            dockerfilePath: ./server/Dockerfile
            dockerContext: ./server
            numInstances: 1
            region: oregon
            plan: starter
            autoDeploy: true
            maxShutdownDelaySeconds: 60
            healthCheckPath: /health
            envVars:
              - fromGroup: gridfs_gui_env
              - key: PORT
                value: "8000"
              - key: HOST
                value: "0.0.0.0"
              - key: DEBUG
                value: "false"
              - key: APP_NAME
                value: "gridfs-gui"
              - key: DATA_DIR
                value: "/app/data"
              # Note: Add the following secrets to gridfs_gui_env group in Render dashboard:
              # - ENCRYPTION_KEY  (generate with: openssl rand -hex 32)
              # - CORS_ORIGINS    (set to your frontend Render URL, e.g. https://gridfs-gui-frontend.onrender.com)
