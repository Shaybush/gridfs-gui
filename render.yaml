previews:
  generation: manual
  expireAfterDays: 1

projects:
  - name: gridfs-gui
    environments:
      - name: production
        services:
          # Frontend (static site)
          - type: web
            name: gridfs-gui-frontend
            runtime: static
            branch: main
            autoDeploy: true
            buildCommand: cd gui && pnpm install && pnpm build
            staticPublishPath: gui/dist
            headers:
              - path: /*
                name: Cache-Control
                value: no-cache
            routes:
              - type: rewrite
                source: /*
                destination: /index.html

          # Backend (FastAPI via Docker)
          - type: web
            name: gridfs-gui-server
            runtime: docker
            branch: main
            rootDir: ./
            dockerfilePath: ./server/Dockerfile
            dockerContext: ./server
            numInstances: 1
            region: oregon
            plan: starter
            autoDeploy: true
            maxShutdownDelaySeconds: 60
            healthCheckPath: /health
            envVars:
              - fromGroup: gridfs_gui_env
              - key: PORT
                value: "8000"
              - key: HOST
                value: "0.0.0.0"
              - key: DEBUG
                value: "false"
              - key: APP_NAME
                value: "gridfs-gui"
              - key: DATA_DIR
                value: "/app/data"
              # Secrets (ENCRYPTION_KEY, CORS_ORIGINS) managed in gridfs_gui_env group on Render dashboard
